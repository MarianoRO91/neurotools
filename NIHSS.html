<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="NIHSS">
<meta name="theme-color" content="#0f1115">
<title>NIHSS</title>
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'%3E%3Crect width='180' height='180' rx='40' fill='%233d6fd1'/%3E%3Ctext x='90' y='118' font-size='62' font-family='system-ui,sans-serif' font-weight='700' fill='white' text-anchor='middle'%3ENIH%3C/text%3E%3C/svg%3E">
<style>
  :root{
    --bg:#0f1115;--panel:#171a21;--panel2:#1e222c;--ink:#e6e8ec;--muted:#9aa3b2;
    --line:#2a2f3a;--accent:#6aa3ff;--accent2:#3d6fd1;--ok:#57c08a;--danger:#e06a6a;
    --mono:ui-monospace,Menlo,Consolas,monospace;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  body{margin:0;background:var(--bg);color:var(--ink);font:16px/1.5 system-ui,-apple-system,Segoe UI,Roboto,sans-serif;padding-bottom:env(safe-area-inset-bottom)}
  header{padding:calc(12px + env(safe-area-inset-top)) 16px 12px;background:var(--panel);border-bottom:1px solid var(--line);position:sticky;top:0;z-index:30}
  .htop{display:flex;align-items:center;justify-content:space-between;gap:10px}
  header h1{font-size:17px;margin:0;font-weight:700;letter-spacing:.3px}
  .total{font-family:var(--mono);font-size:15px;color:var(--accent);font-weight:700;background:var(--panel2);border:1px solid var(--line);padding:4px 12px;border-radius:20px}
  .total .sev{font-size:11px;color:var(--muted);font-weight:500;margin-left:6px}
  main{padding:14px;max-width:680px;margin:0 auto}
  .ladoRow{margin:0 0 12px}
  .ladoRow label{display:block;font-size:12px;color:var(--muted);margin-bottom:5px}
  .seg{display:inline-flex;border:1px solid var(--line);border-radius:8px;overflow:hidden}
  .seg button{background:var(--panel2);border:none;color:var(--muted);padding:8px 16px;cursor:pointer;font:inherit;font-size:13px;border-right:1px solid var(--line);font-weight:600}
  .seg button:last-child{border-right:none}
  .seg button.on{background:var(--accent2);color:#fff}
  .item{background:var(--panel);border:1px solid var(--line);border-radius:12px;padding:12px;margin-bottom:10px}
  .item .lab{font-weight:600;font-size:14px;margin-bottom:8px}
  .item .lab .pts{float:right;font-family:var(--mono);color:var(--accent);font-size:13px}
  .ladoItem{display:inline-flex;border:1px solid var(--line);border-radius:7px;overflow:hidden;margin:0 0 8px}
  .ladoItem button{background:var(--panel2);border:none;color:var(--muted);padding:5px 12px;cursor:pointer;font:inherit;font-size:12px;border-right:1px solid var(--line);font-weight:600}
  .ladoItem button:last-child{border-right:none}
  .ladoItem button.on{background:var(--accent2);color:#fff}
  .opts{display:flex;flex-direction:column;gap:5px}
  .opts button{text-align:left;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:9px 11px;font:inherit;font-size:13px;cursor:pointer;display:flex;gap:9px;align-items:flex-start;line-height:1.35}
  .opts button .n{font-family:var(--mono);font-weight:700;color:var(--muted);min-width:18px}
  .opts button.on{background:var(--accent2);border-color:var(--accent);color:#fff}
  .opts button.on .n{color:#fff}
  .bar{position:sticky;bottom:0;background:var(--panel);border-top:1px solid var(--line);padding:10px 14px calc(10px + env(safe-area-inset-bottom));display:flex;gap:8px;z-index:30}
  .btn{flex:1;background:var(--accent2);border:none;color:#fff;padding:13px;border-radius:11px;font:inherit;font-weight:700;font-size:14px;cursor:pointer}
  .btn:active{opacity:.8}
  .btn.ghost{background:transparent;border:1px solid var(--line);color:var(--ink);flex:0 0 auto;padding:13px 16px}
  .btn.warn{background:transparent;border:1px solid var(--danger);color:var(--danger)}
  .out{background:#000;border:1px solid var(--line);border-radius:11px;padding:14px;font-family:var(--mono);font-size:13px;white-space:pre-wrap;margin-bottom:12px;line-height:1.5}
  .outlabel{font-size:11px;color:var(--muted);margin:2px 0 4px;text-transform:uppercase;letter-spacing:.5px}
  .sheet{position:fixed;inset:0;background:rgba(0,0,0,.6);display:none;align-items:flex-end;z-index:40}
  .sheet.show{display:flex}
  .sheet-inner{background:var(--panel);width:100%;border-radius:18px 18px 0 0;padding:16px 16px calc(20px + env(safe-area-inset-bottom));max-height:85vh;overflow:auto}
  .sheet h2{font-size:15px;margin:0 0 12px;display:flex;justify-content:space-between;align-items:center}
  .sheet h2 .x{color:var(--muted);font-size:22px;cursor:pointer;padding:0 6px}
  .slot{display:flex;align-items:center;gap:8px;border:1px solid var(--line);border-radius:11px;padding:10px;margin-bottom:8px;background:var(--panel2)}
  .slot .info{flex:1;min-width:0}
  .slot .info .name{font-weight:600;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .slot .info .meta{font-size:12px;color:var(--muted);font-family:var(--mono)}
  .slot .info .empty{color:var(--muted);font-style:italic;font-weight:400}
  .slot button{background:var(--accent2);border:none;color:#fff;border-radius:8px;padding:7px 11px;font:inherit;font-size:12px;font-weight:600;cursor:pointer}
  .slot button.load{background:var(--panel);border:1px solid var(--line);color:var(--ink)}
  .slot button.del{background:transparent;border:1px solid var(--danger);color:var(--danger)}
  input[type=text]{width:100%;background:var(--panel2);border:1px solid var(--line);color:var(--ink);border-radius:9px;padding:11px;font:inherit;margin-bottom:10px}
  .toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:var(--ok);color:#06281a;padding:10px 20px;border-radius:10px;font-weight:700;font-size:14px;opacity:0;transition:opacity .2s;pointer-events:none;z-index:60}
  .toast.show{opacity:1}
  .hint{font-size:12px;color:var(--muted);text-align:center;padding:8px 0 2px}
</style>
</head>
<body>
<header>
  <div class="htop">
    <h1>NIHSS</h1>
    <div class="total"><span id="total">0</span><span class="sev" id="sev">sin déficit</span></div>
  </div>
</header>

<main>
  <div id="items"></div>
  <div class="outlabel">Exploración cualitativa</div>
  <div class="out" id="outProsa"></div>
  <div class="outlabel">Puntuación</div>
  <div class="out" id="out"></div>
  <div class="hint">Para instalar como icono: menú del navegador → «Añadir a pantalla de inicio».</div>
</main>

<div class="bar">
  <button class="btn ghost" onclick="openSheet()">Pacientes</button>
  <button class="btn ghost" onclick="resetCalc()">Limpiar</button>
  <button class="btn" onclick="copyOut()">Copiar</button>
</div>

<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <h2>Pacientes guardados <span class="x" onclick="closeSheet()">✕</span></h2>
    <input type="text" id="patLabel" placeholder="Etiqueta para guardar (cama, iniciales, nº…)" maxlength="24">
    <button class="btn" style="width:100%;margin-bottom:14px" onclick="saveCurrent()">Guardar exploración actual</button>
    <div id="slots"></div>
    <button class="btn warn" style="width:100%;margin-top:6px" onclick="clearAll()">Borrar todos los pacientes</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
function $(id){return document.getElementById(id)}
function toast(m){const t=$('toast');t.textContent=m;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1300)}

/* Ítems NIHSS (descripción por nivel). Orden motor: DERECHO primero (formato del hospital). */
const NIH_ITEMS=[
 ['1a Consciencia','0 alerta · 1 somnoliento · 2 obnubilado · 3 coma',3],
 ['1b Preguntas (mes, edad)','0 ambas · 1 una · 2 ninguna',2],
 ['1c Órdenes','0 ambas · 1 una · 2 ninguna',2],
 ['2 Mirada','0 normal · 1 paresia parcial · 2 desviación forzada',2],
 ['3 Campos visuales','0 normal · 1 hemianopsia parcial · 2 completa · 3 bilateral',3],
 ['4 Paresia facial','0 normal · 1 menor · 2 parcial · 3 completa',3],
 ['5a Brazo DERECHO','0 no caída · 1 caída en <10s · 2 esfuerzo contra gravedad · 3 movimiento en plano · 4 plejia',4],
 ['5b Brazo IZQUIERDO','0 no caída · 1 caída en <10s · 2 esfuerzo contra gravedad · 3 movimiento en plano · 4 plejia',4],
 ['6a Pierna DERECHA','0 no caída · 1 caída en <5s · 2 esfuerzo contra gravedad · 3 movimiento en plano · 4 plejia',4],
 ['6b Pierna IZQUIERDA','0 no caída · 1 caída en <5s · 2 esfuerzo contra gravedad · 3 movimiento en plano · 4 plejia',4],
 ['7 Ataxia','0 ausente · 1 una extremidad · 2 dos',2],
 ['8 Sensibilidad','0 normal · 1 leve-moderada · 2 grave/anestesia',2],
 ['9 Lenguaje','0 normal · 1 leve-moderada · 2 grave · 3 mutismo/global',3],
 ['10 Disartria','0 normal · 1 leve-moderada · 2 grave/anartria',2],
 ['11 Extinción e inatención (anosognosia)','0 normal · 1 parcial · 2 completa',2],
];
let sel=NIH_ITEMS.map(()=>0);
const L={mirada:'',campos:'',facial:'',sensib:''};
const LADO_ITEM={3:'mirada',4:'campos',5:'facial',11:'sensib'}; // índice de ítem -> clave de lado

function render(){
  const host=$('items');host.innerHTML='';
  NIH_ITEMS.forEach((it,i)=>{
    const d=document.createElement('div');d.className='item';
    const descs=it[1].split(' · ');
    const opts=[];for(let v=0;v<=it[2];v++)opts.push(`<button data-i="${i}" data-v="${v}" class="${sel[i]===v?'on':''}"><span class="n">${v}</span><span>${(descs[v]||'').replace(/^\d+\s/,'')}</span></button>`);
    let ladoSel='';
    if(LADO_ITEM[i]){const k=LADO_ITEM[i];ladoSel=`<div class="ladoItem" data-lk="${k}"><button data-l="der" class="${L[k]==='der'?'on':''}">Dcha</button><button data-l="izq" class="${L[k]==='izq'?'on':''}">Izda</button><button data-l="" class="${L[k]===''?'on':''}">—</button></div>`;}
    d.innerHTML=`<div class="lab">${it[0]}<span class="pts" id="pts_${i}">${sel[i]}</span></div>${ladoSel}<div class="opts">${opts.join('')}</div>`;
    host.appendChild(d);
  });
  host.querySelectorAll('.opts button').forEach(b=>b.onclick=()=>{
    const i=+b.dataset.i;sel[i]=+b.dataset.v;
    const item=host.querySelectorAll('.item')[i];
    item.querySelectorAll('.opts button').forEach(x=>x.classList.remove('on'));
    b.classList.add('on');$('pts_'+i).textContent=sel[i];
    update();
  });
  host.querySelectorAll('.ladoItem').forEach(grp=>{const k=grp.dataset.lk;grp.querySelectorAll('button').forEach(b=>b.onclick=()=>{grp.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');L[k]=b.dataset.l;update();})});
  update();
}
function total(){return sel.reduce((a,b)=>a+b,0)}
function severidad(t){return t===0?'sin déficit':t<=4?'leve':t<=15?'moderado':t<=20?'moderado-grave':'grave'}
function fmt(){return `${sel.slice(0,5).join('+')}\n${sel.slice(5,10).join('+')} NIHSS ${total()}\n${sel.slice(10,15).join('+')}`}

/* prosa cualitativa: descripción + (puntuación); normales en estilo cribado */
function capP(s){return s.charAt(0).toUpperCase()+s.slice(1)}
function lt(l){return l==='der'?'derecha':l==='izq'?'izquierda':''}
function nihProsa(n,L){
  L=L||{};
  const P=[];
  const A=(v,norm,desc)=>{if(v===0){if(norm)P.push(norm)}else{P.push(desc(v)+' ('+v+')')}};
  A(n[0],'alerta',v=>({1:'somnoliento',2:'obnubilado',3:'coma'})[v]);
  A(n[1],'responde mes y edad',v=>({1:'responde una pregunta',2:'no responde mes ni edad'})[v]);
  A(n[2],'obedece órdenes',v=>({1:'obedece una orden',2:'no obedece órdenes'})[v]);
  const lm=lt(L.mirada);
  A(n[3],'MOEs sin restricción',v=>({1:'paresia parcial de la mirada',2:'desviación forzada de la mirada'+(lm?' a la '+lm:'')})[v]);
  const lc=lt(L.campos);
  A(n[4],'campos por confrontación normales',v=>({1:'hemianopsia parcial'+(lc?' '+lc:''),2:'hemianopsia completa'+(lc?' '+lc:''),3:'hemianopsia bilateral'})[v]);
  const lf=lt(L.facial);
  A(n[5],'no asimetría facial',v=>({1:'paresia facial menor'+(lf?' '+lf:''),2:'paresia facial parcial'+(lf?' '+lf:''),3:'paresia facial completa'+(lf?' '+lf:'')})[v]);
  const cl={1:'caída en <10s',2:'esfuerzo contra gravedad',3:'movimiento en plano',4:'plejia'};
  const clP={1:'caída en <5s',2:'esfuerzo contra gravedad',3:'movimiento en plano',4:'plejia'};
  if(n[6]===0&&n[7]===0)P.push('sin claudicación de miembros superiores');
  else{if(n[6]>0)P.push('miembro superior derecho con '+cl[n[6]]+' ('+n[6]+')');if(n[7]>0)P.push('miembro superior izquierdo con '+cl[n[7]]+' ('+n[7]+')')}
  if(n[8]===0&&n[9]===0)P.push('sin claudicación de miembros inferiores');
  else{if(n[8]>0)P.push('miembro inferior derecho con '+clP[n[8]]+' ('+n[8]+')');if(n[9]>0)P.push('miembro inferior izquierdo con '+clP[n[9]]+' ('+n[9]+')')}
  A(n[10],'no dismetría',v=>({1:'ataxia en una extremidad',2:'ataxia en dos extremidades'})[v]);
  const ls=lt(L.sensib);
  A(n[11],'sensibilidad conservada',v=>({1:'hipoestesia leve-moderada'+(ls?' '+ls:''),2:'anestesia'+(ls?' '+ls:'')})[v]);
  A(n[12],'lenguaje conservado',v=>({1:'afasia leve-moderada',2:'afasia grave',3:'mutismo/afasia global'})[v]);
  A(n[13],'no disartria',v=>({1:'disartria leve-moderada',2:'disartria grave/anartria'})[v]);
  A(n[14],'sin extinción ni inatención',v=>({1:'extinción/inatención parcial (anosognosia)',2:'extinción/inatención completa (anosognosia)'})[v]);
  return P.length?P.map(capP).join('. ')+'.':'';
}
function update(){
  $('total').textContent=total();
  $('sev').textContent=severidad(total());
  $('outProsa').textContent=nihProsa(sel,L)||'(sin hallazgos)';
  $('out').textContent=fmt();
}
function copyText(){return (nihProsa(sel,L)?nihProsa(sel,L)+'\n\n':'')+fmt()}
function copyOut(){const t=copyText();navigator.clipboard.writeText(t).then(()=>toast('Copiado')).catch(()=>{
  const ta=document.createElement('textarea');ta.value=t;document.body.appendChild(ta);ta.select();
  try{document.execCommand('copy');toast('Copiado')}catch(e){toast('No se pudo copiar')}
  document.body.removeChild(ta);
})}
function resetCalc(){sel=NIH_ITEMS.map(()=>0);L.mirada='';L.campos='';L.facial='';L.sensib='';render();toast('Limpiado')}

/* ===== 5 pacientes ===== */
const KEY='nihss_pacientes';
function load(){try{return JSON.parse(localStorage.getItem(KEY))||[]}catch(e){return []}}
function store(arr){localStorage.setItem(KEY,JSON.stringify(arr))}
function openSheet(){renderSlots();$('sheet').classList.add('show')}
function closeSheet(){$('sheet').classList.remove('show')}
function saveCurrent(){
  const label=($('patLabel').value||'').trim();
  if(!label){toast('Pon una etiqueta');return}
  let arr=load();
  const now=new Date();
  const stamp=now.toLocaleDateString('es-ES',{day:'2-digit',month:'2-digit'})+' '+now.toLocaleTimeString('es-ES',{hour:'2-digit',minute:'2-digit'});
  arr.unshift({label,sel:[...sel],L:{...L},total:total(),stamp});
  if(arr.length>5)arr=arr.slice(0,5);
  store(arr);$('patLabel').value='';renderSlots();toast('Guardado');
}
function renderSlots(){
  const arr=load();const host=$('slots');host.innerHTML='';
  if(!arr.length){host.innerHTML='<div class="slot"><div class="info"><span class="empty">Sin pacientes guardados</span></div></div>';return}
  arr.forEach((p,idx)=>{
    const d=document.createElement('div');d.className='slot';
    d.innerHTML=`<div class="info"><div class="name">${p.label}</div><div class="meta">NIHSS ${p.total} · ${p.stamp}</div></div>
      <button class="load" data-i="${idx}">Cargar</button>
      <button class="del" data-d="${idx}">✕</button>`;
    host.appendChild(d);
  });
  host.querySelectorAll('.load').forEach(b=>b.onclick=()=>{const arr=load();const p=arr[+b.dataset.i];sel=[...p.sel];const pl=p.L||{};L.mirada=pl.mirada||'';L.campos=pl.campos||'';L.facial=pl.facial||'';L.sensib=pl.sensib||'';render();closeSheet();toast('Cargado')});
  host.querySelectorAll('.del').forEach(b=>b.onclick=()=>{let arr=load();arr.splice(+b.dataset.d,1);store(arr);renderSlots()});
}
function clearAll(){if(confirm('¿Borrar todos los pacientes guardados?')){localStorage.removeItem(KEY);renderSlots();toast('Todo borrado')}}
$('sheet').addEventListener('click',e=>{if(e.target===$('sheet'))closeSheet()});

render();
</script>
</body>
</html>
